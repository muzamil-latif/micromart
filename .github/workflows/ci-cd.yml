name: MicroMart CI/CD

on:
  push:
    branches:
      - main
    paths:
      - 'services/auth-service/**'
      - 'services/catalog-service/**'
      - 'services/cart-service/**'
      - 'services/order-service/**'
      - 'services/payment-service/**'
      - 'services/notification-service/**'

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        service:
          - name: auth-service
            image: micromart-auth
          - name: catalog-service
            image: micromart-catalog
          - name: cart-service
            image: micromart-cart
          - name: order-service
            image: micromart-order
          - name: payment-service
            image: micromart-payment
          - name: notification-service
            image: micromart-notification

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Check if service changed
        id: changes
        uses: dorny/paths-filter@v3
        with:
          filters: |
            changed:
              - 'services/${{ matrix.service.name }}/**'

      - name: Login to Docker Hub
        if: steps.changes.outputs.changed == 'true'
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and push image
        if: steps.changes.outputs.changed == 'true'
        uses: docker/build-push-action@v5
        with:
          context: ./services/${{ matrix.service.name }}
          push: true
          tags: |
            ${{ secrets.DOCKER_USERNAME }}/${{ matrix.service.image }}:latest
            ${{ secrets.DOCKER_USERNAME }}/${{ matrix.service.image }}:${{ github.sha }}
