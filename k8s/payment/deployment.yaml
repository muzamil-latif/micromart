apiVersion: apps/v1
kind: Deployment
metadata:
  name: payment-service
  namespace: micromart
spec:
  replicas: 1
  selector:
    matchLabels:
      app: payment-service
  template:
    metadata:
      labels:
        app: payment-service
    spec:
      containers:
        - name: payment-service
          image: mlmakhdoomi/micromart-payment:v1
          ports:
            - containerPort: 8005
          env:
            - name: DATABASE_URL
              value: "postgresql://micromart:micromart123@postgres:5432/micromart"